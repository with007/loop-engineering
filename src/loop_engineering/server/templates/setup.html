<div x-data="setupForm()">
    <h1>添加项目</h1>
    <p style="color: var(--muted); margin-bottom: 20px;">在新项目中运行 loop setup</p>

    {% if error %}
    <div class="card" style="background: var(--fail-bg); color: var(--fail); margin-bottom: 16px;">
        {{ error }}
    </div>
    {% endif %}

    <div class="grid grid-2" style="margin-bottom: 24px;">
        <div class="card">
            <h3>项目根目录</h3>
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <input type="text" x-model="projectRoot" placeholder="d:/work_pvp/myproject"
                       style="flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px 14px; border-radius: 7px; font-size: 14px;">
                <button class="btn btn-sm" style="background: var(--surface2); color: var(--text);"
                        @click="toggleBrowser('project')">浏览</button>
            </div>
            <template x-if="showBrowser === 'project'">
                <div class="card" style="padding: 8px; max-height: 260px; overflow-y: auto; background: var(--bg);">
                    <template x-for="e in browseEntries" :key="e.path">
                        <div @click="entryClick('project', e)"
                             style="padding: 5px 8px; cursor: pointer; border-radius: 4px; font-size: 13px;"
                             @mouseover="$el.style.background='var(--surface2)'"
                             @mouseout="$el.style.background='transparent'">
                            <span x-show="e.is_drive" style="color: var(--pass);">💾 </span>
                            <span x-show="!e.is_drive" style="color: var(--pass);">📁 </span>
                            <span x-text="e.name" style="color: var(--text);"></span>
                        </div>
                    </template>
                    <div x-show="browseEntries.length === 0" style="color: var(--dim); font-size: 12px; padding: 8px;">
                        空目录或无权访问
                    </div>
                    <div style="border-top: 1px solid var(--border); padding-top: 6px; margin-top: 6px;">
                        <a href="#" @click.prevent="goUp('project')"
                           style="color: var(--muted); font-size: 12px;">.. 上级目录</a>
                        <span x-show="!browseEntries.is_drive" style="margin-left: 8px; font-size: 12px; color: var(--dim);" x-text="browsePath"></span>
                    </div>
                </div>
            </template>
        </div>

        <div class="card">
            <h3>Agent 工作区目录</h3>
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <input type="text" x-model="agentWorkspace" placeholder="自动检测，或手动选择"
                       style="flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px 14px; border-radius: 7px; font-size: 14px;">
                <button class="btn btn-sm" style="background: var(--surface2); color: var(--text);"
                        @click="toggleBrowser('agent')">浏览</button>
            </div>
            <template x-if="showBrowser === 'agent'">
                <div class="card" style="padding: 8px; max-height: 260px; overflow-y: auto; background: var(--bg);">
                    <template x-for="e in browseEntries" :key="e.path">
                        <div @click="entryClick('agent', e)"
                             style="padding: 5px 8px; cursor: pointer; border-radius: 4px; font-size: 13px;"
                             @mouseover="$el.style.background='var(--surface2)'"
                             @mouseout="$el.style.background='transparent'">
                            <span x-show="e.is_drive" style="color: var(--pass);">💾 </span>
                            <span x-show="!e.is_drive" style="color: var(--pass);">📁 </span>
                            <span x-text="e.name" style="color: var(--text);"></span>
                        </div>
                    </template>
                    <div x-show="browseEntries.length === 0" style="color: var(--dim); font-size: 12px; padding: 8px;">
                        空目录或无权访问
                    </div>
                    <div style="border-top: 1px solid var(--border); padding-top: 6px; margin-top: 6px;">
                        <a href="#" @click.prevent="goUp('agent')"
                           style="color: var(--muted); font-size: 12px;">.. 上级目录</a>
                        <span style="margin-left: 8px; font-size: 12px; color: var(--dim);" x-text="browsePath"></span>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="card" style="max-width: 560px; margin-bottom: 16px;">
        <div class="form-group">
            <label>Agent 名称（留空自动检测 git config user.name）</label>
            <input name="agent_name" placeholder="with">
        </div>
        <div class="form-group">
            <label>项目类型预设（可选）</label>
            <select name="type" style="background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px 14px; border-radius: 7px; width: 100%; font-size: 14px;">
                <option value="">不选择（通用）</option>
                <option value="unity-tolua">Unity + ToLua</option>
                <option value="unity-basic">Unity Basic (C# only)</option>
                <option value="node-frontend">Node.js Frontend</option>
                <option value="go-backend">Go Backend</option>
                <option value="generic">Generic</option>
            </select>
        </div>
    </div>

    <form hx-post="/setup/run" hx-target="closest div" hx-swap="outerHTML">
        <input type="hidden" name="project_root" :value="projectRoot">
        <input type="hidden" name="agent_workspace" :value="agentWorkspace">
        <button type="submit" class="btn btn-primary">运行 Setup</button>
    </form>
</div>

<script>
    function setupForm() {
        return {
            projectRoot: '',
            agentWorkspace: '',
            showBrowser: null,
            browsePath: '',
            browseParent: '',
            browseEntries: [],
            toggleBrowser(target) {
                this.showBrowser = this.showBrowser === target ? null : target;
                if (this.showBrowser) this.loadDir('');
            },
            entryClick(target, e) {
                if (e.is_drive) {
                    this.loadDir(e.path);
                } else {
                    this.loadDir(e.path);
                    if (target === 'project') this.projectRoot = e.path;
                    else this.agentWorkspace = e.path;
                }
            },
            goUp(target) {
                if (this.browseParent) this.loadDir(this.browseParent);
            },
            async loadDir(path) {
                var url = '/api/setup/browse';
                if (path) url += '?path=' + encodeURIComponent(path);
                try {
                    var resp = await fetch(url);
                    var data = await resp.json();
                    this.browsePath = data.path || '';
                    this.browseParent = data.parent || '';
                    this.browseEntries = data.entries || [];
                } catch(e) {
                    this.browseEntries = [];
                }
            }
        }
    }
</script>
