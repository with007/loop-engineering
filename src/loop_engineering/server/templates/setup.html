<div x-data="setupForm()">
    <h1>添加项目</h1>
    <p style="color: var(--muted); margin-bottom: 20px;">在新项目中运行 loop setup</p>

    {% if error %}
    <div class="card" style="background: var(--fail-bg); color: var(--fail); margin-bottom: 16px;">
        {{ error }}
    </div>
    {% endif %}

    <!-- 1. Project type -->
    <div class="card" style="max-width: 560px; margin-bottom: 16px;">
        <div class="form-group">
            <label>项目类型</label>
            <select name="type" x-model="selectedType" @change="selectedType = $el.value; verifySteps = PRESETS[$el.value] || []"
                    style="background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px 14px; border-radius: 7px; width: 100%; font-size: 14px;">
                <option value="">Generic（通用）</option>
                <option value="unity-tolua">Unity + ToLua</option>
                <option value="unity-basic">Unity Basic (C# only)</option>
                <option value="node-frontend">Node.js Frontend</option>
                <option value="go-backend">Go Backend</option>
            </select>
        </div>
    </div>

    <!-- 2. Project & Agent directories -->
    <div class="grid grid-2" style="margin-bottom: 16px;">
        <div class="card">
            <h3>项目根目录</h3>
            <div style="display: flex; gap: 8px;">
                <input type="text" x-model="projectRoot" placeholder="d:/work_pvp/myproject"
                       @input="onProjectRootChange()"
                       style="flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px 14px; border-radius: 7px; font-size: 14px;">
                <button class="btn btn-sm" style="background: var(--surface2); color: var(--text);"
                        @click="pickFolder('project')">选择</button>
            </div>
            <template x-if="isUnity">
                <div class="form-group" style="margin-top: 8px; margin-bottom: 0;">
                    <label>MCP 端口</label>
                    <input type="number" x-model="mainPort" name="main_port" value="8080"
                           style="background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 7px; font-size: 14px; width: 120px;">
                </div>
            </template>
        </div>

        <div class="card">
            <h3>Agent 工作区目录</h3>
            <div style="display: flex; gap: 8px;">
                <input type="text" x-model="agentWorkspace" placeholder="选择项目根目录后自动填入"
                       style="flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px 14px; border-radius: 7px; font-size: 14px;">
                <button class="btn btn-sm" style="background: var(--surface2); color: var(--text);"
                        @click="pickFolder('agent')">选择</button>
            </div>
            <template x-if="isUnity">
                <div class="form-group" style="margin-top: 8px; margin-bottom: 0;">
                    <label>MCP 端口</label>
                    <input type="number" x-model="agentPort" name="agent_port" value="9080"
                           style="background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 7px; font-size: 14px; width: 120px;">
                </div>
            </template>
        </div>
    </div>

    <!-- 3. Agent name + verify preview -->
    <div class="card" style="max-width: 560px; margin-bottom: 16px;">
        <div class="form-group">
            <label>Agent 名称（留空自动检测 git config user.name）</label>
            <input name="agent_name" placeholder="{{ git_user or 'agent name' }}">
        </div>

        <!-- Verify steps preview -->
        <div x-show="verifySteps.length > 0 || selectedType">
            <h3 style="margin-top: 16px;">验证步骤
                <span x-show="!selectedType" style="font-size: 12px; color: var(--dim);">（自定义）</span>
                <span x-show="selectedType" style="font-size: 12px; color: var(--pass);" x-text="'（' + selectedType + ' 预设）'"></span>
            </h3>
            <div x-show="verifySteps.length === 0" style="color: var(--dim); font-size: 13px; padding: 10px 0;">
                空 — verifier 不做检查，直接 PASS
            </div>
            <template x-for="(s, i) in verifySteps" :key="i">
                <div style="display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;">
                    <span class="badge badge-pending" x-text="s.type" style="min-width: 90px; text-align: center;"></span>
                    <span x-text="s.id" style="flex: 1;"></span>
                    <template x-if="s.command">
                        <code style="font-size: 11px; color: var(--dim);" x-text="s.command"></code>
                    </template>
                </div>
            </template>
        </div>
    </div>

    <form hx-post="/setup/run" hx-target="closest div" hx-swap="outerHTML"
          hx-on::before-request="document.getElementById('setup-overlay').style.display='flex'"
          hx-on::after-request="document.getElementById('setup-overlay').style.display='none'">
        <input type="hidden" name="project_root" :value="projectRoot">
        <input type="hidden" name="agent_workspace" :value="agentWorkspace">
        <input type="hidden" name="main_port" :value="mainPort">
        <input type="hidden" name="agent_port" :value="agentPort">
        <button type="submit" class="btn btn-primary">运行 Setup</button>
    </form>

    <!-- 全屏遮罩 -->
    <div id="setup-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.7); z-index: 9999;">
        <div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%;">
            <div style="text-align: center;">
                <div style="width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--pass);
                    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;"></div>
                <p style="color: var(--text); font-size: 16px;">正在运行 Setup...</p>
            </div>
        </div>
    </div>
</div>

<script>
    var PRESETS = {
        'unity-tolua': [
            {type:'unity_refresh', id:'compile'},
            {type:'shell', id:'gen_lua_path', command:'python scripts/genLuaPath.py', condition:'lua_files_added'},
            {type:'lua_test', id:'runtime_test'}
        ],
        'unity-basic': [{type:'unity_refresh', id:'compile'}],
        'node-frontend': [{type:'npm_build', id:'build'}, {type:'npm_test', id:'test'}],
        'go-backend': [{type:'go_build', id:'build'}, {type:'go_test', id:'test'}],
        'generic': [{type:'shell', id:'build', command:'npm run build || echo skipped'}, {type:'shell', id:'test', command:'npm test || echo skipped'}]
    };
    function setupForm() {
        function genWorkspace(root) {
            if (!root) return '';
            var p = root.replace(/\\/g, '/').replace(/\/$/, '');
            var parts = p.split('/');
            if (parts.length < 3) return '';
            var parentName = parts[parts.length - 2];
            parts.pop();  // project name
            parts.pop();  // parent dir
            return parts.join('/') + '/' + parentName + '-agent';
        }
        return {
            projectRoot: '',
            agentWorkspace: '',
            selectedType: '',
            verifySteps: [],
            mainPort: 8080,
            agentPort: 9080,
            get isUnity() { return this.selectedType.startsWith('unity'); },
            onProjectRootChange() {
                var ws = genWorkspace(this.projectRoot);
                if (ws) this.agentWorkspace = ws;
            },
            async pickFolder(target) {
                console.log('pickFolder called:', target);
                try {
                    var resp = await fetch('/api/setup/pickfolder');
                    var data = await resp.json();
                    console.log('pickFolder result:', data);
                    if (data.path) {
                        if (target === 'project') {
                            this.projectRoot = data.path;
                            this.onProjectRootChange();
                        }
                        else this.agentWorkspace = data.path;
                    }
                } catch(e) {
                    console.error('pickFolder error:', e);
                    alert('选择文件夹失败: ' + e.message);
                }
            }
        }
    }
</script>
