<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Engineering Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9"></script>
    <script defer src="https://unpkg.com/alpinejs@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        :root {
            --bg: #0b1120;
            --surface: #111827;
            --surface2: #1a2332;
            --border: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --dim: #64748b;
            /* Color-blind friendly palette */
            --pass: #3b82f6;       /* blue — replace green */
            --pass-bg: #172554;    /* dark blue */
            --fail: #f97316;       /* orange — replace red */
            --fail-bg: #431407;    /* dark orange */
            --active: #eab308;     /* yellow — in progress */
            --active-bg: #422006;  /* dark yellow */
            --pending: #6b7280;    /* gray — pending */
            --pending-bg: #1f2937; /* dark gray */
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 28px;
        }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--pass); }
        nav { display: flex; gap: 4px; background: var(--surface); border-radius: var(--radius); padding: 4px; }
        nav a { color: var(--muted); text-decoration: none; padding: 8px 18px; border-radius: 7px; font-size: 14px; font-weight: 500; transition: all 0.15s; }
        nav a:hover { color: var(--text); background: var(--surface2); }
        nav a.active { background: var(--pass); color: white; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        h3 { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
        .grid { display: grid; gap: 20px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        @media (max-width: 900px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }

        .stat { text-align: center; padding: 20px; }
        .stat-value { font-size: 36px; font-weight: 800; line-height: 1; }
        .stat-label { font-size: 13px; color: var(--muted); margin-top: 6px; }
        .stat-value.pass { color: var(--pass); }
        .stat-value.fail { color: var(--fail); }
        .stat-value.active { color: var(--active); }
        .stat-value.pending { color: var(--pending); }

        .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-pass { background: var(--pass-bg); color: var(--pass); }
        .badge-pass::before { content: '\2713 '; }
        .badge-fail { background: var(--fail-bg); color: var(--fail); }
        .badge-fail::before { content: '\2717 '; }
        .badge-active { background: var(--active-bg); color: var(--active); }
        .badge-active::before { content: '~ '; }
        .badge-pending { background: var(--pending-bg); color: var(--pending); }
        .badge-pending::before { content: '\2014 '; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; }
        th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        td { border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover td { background: rgba(255,255,255,0.015); }

        .btn { padding: 8px 18px; border: none; border-radius: 7px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; }
        .btn-primary { background: var(--pass); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-success { background: var(--pass); color: white; }
        .btn-warn { background: var(--active); color: #000; font-weight: 600; }
        .btn-danger { background: var(--fail); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .form-group { margin-bottom: 12px; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border);
            border-radius: 7px; background: var(--bg); color: var(--text); font-size: 14px;
            transition: border-color 0.15s;
        }
        .form-group input:focus { outline: none; border-color: var(--pass); }

        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .status-indicator { display: flex; align-items: center; gap: 10px; padding: 12px 20px; background: var(--surface2); border-radius: var(--radius); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-dot.online { background: var(--pass); box-shadow: 0 0 8px var(--pass); }
        .status-dot.paused { background: var(--active); box-shadow: 0 0 8px var(--active); }
        .status-dot.offline { background: var(--dim); }

        .chart-wrap { position: relative; max-width: 200px; margin: 0 auto; }
        .chart-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .chart-center .pct { font-size: 28px; font-weight: 800; }
        .chart-center .lbl { font-size: 11px; color: var(--muted); }

        .task-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
        .task-row .status-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
        .status-done { background: var(--pass-bg); color: var(--pass); border: 2px solid var(--pass); }
        .status-active-label { background: var(--active-bg); color: var(--active); border: 2px solid var(--active); }
        .status-pending-label { background: var(--pending-bg); color: var(--pending); border: 1px dashed var(--pending); }

        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .progress-fill.pass { background: var(--pass); }
        .progress-fill.active { background: var(--active); }
        .progress-fill.pending { background: var(--pending); }

        .timeline { position: relative; padding-left: 24px; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--border); }
        .timeline-item { position: relative; padding: 12px 0 12px 24px; }
        .timeline-item::before { content: ''; position: absolute; left: -19px; top: 18px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); }
        .timeline-item.pass::before { border-color: var(--pass); background: var(--pass); }
        .timeline-item.fail::before { border-color: var(--fail); background: var(--fail); }

        .info-row { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 16px; }
        .info-item { display: flex; flex-direction: column; gap: 2px; }
        .info-item .label { font-size: 11px; color: var(--dim); text-transform: uppercase; }
        .info-item .value { font-size: 14px; font-weight: 500; }

        .inline-form { display: flex; gap: 10px; align-items: flex-end; }
        .inline-form .form-group { flex: 1; margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
                <div class="logo">Loop <span>Engineering</span></div>
                <nav>
                    <a href="/" hx-get="/" hx-target="#content" hx-push-url="true" class="active">概览</a>
                    <a href="/tasks" hx-get="/tasks" hx-target="#content" hx-push-url="true">任务</a>
                    <a href="/runs" hx-get="/runs" hx-target="#content" hx-push-url="true">历史</a>
                    <a href="/control" hx-get="/control" hx-target="#content" hx-push-url="true">控制</a>
                    <a href="/setup" hx-get="/setup" hx-target="#content" hx-push-url="true" style="color: var(--active);">+ Setup</a>
                </nav>
                <div id="project-switcher" style="margin-left: auto;"
                     hx-get="/api/projects/switcher" hx-trigger="load, every 60s">
                    <span style="color: var(--dim); font-size: 13px;">loading...</span>
                </div>
            </div>
        </header>
        <div id="content">
            {{ content | safe }}
        </div>
    </div>
    <script>
        // Update nav active state
        function updateNav() {
            var path = window.location.pathname;
            document.querySelectorAll('nav a').forEach(function(a) {
                a.classList.toggle('active', a.getAttribute('href') === path);
            });
        }
        document.body.addEventListener('htmx:afterSettle', updateNav);
        updateNav();  // initial call

        // Preserve ?project= param across all HTMX requests
        document.body.addEventListener('htmx:configRequest', function(evt) {
            var params = new URLSearchParams(window.location.search);
            var proj = params.get('project');
            if (proj && !evt.detail.path.includes('project=')) {
                evt.detail.path += (evt.detail.path.includes('?') ? '&' : '?') + 'project=' + encodeURIComponent(proj);
            }
        });
    </script>
</body>
</html>
