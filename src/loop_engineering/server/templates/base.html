<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Engineering 控制台</title>
    <script src="https://unpkg.com/htmx.org@1.9"></script>
    <script defer src="https://unpkg.com/alpinejs@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0b1120;
            --surface: #111827;
            --surface2: #1a2332;
            --border: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --dim: #64748b;
            /* Color-blind friendly palette */
            --pass: #3b82f6;       /* blue — replace green */
            --pass-bg: #172554;    /* dark blue */
            --fail: #f97316;       /* orange — replace red */
            --fail-bg: #431407;    /* dark orange */
            --active: #eab308;     /* yellow — in progress */
            --active-bg: #422006;  /* dark yellow */
            --pending: #6b7280;    /* gray — pending */
            --pending-bg: #1f2937; /* dark gray */
            --reopen: #a855f7;     /* purple — reopen */
            --reopen-bg: #2a1040;  /* dark purple */
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 28px;
        }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--pass); }
        nav { display: flex; gap: 4px; background: var(--surface); border-radius: var(--radius); padding: 4px; }
        nav a { color: var(--muted); text-decoration: none; padding: 8px 18px; border-radius: 7px; font-size: 14px; font-weight: 500; transition: all 0.15s; }
        nav a:hover { color: var(--text); background: var(--surface2); }
        nav a.active { background: var(--pass); color: white; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        h3 { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
        .grid { display: grid; gap: 20px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        @media (max-width: 900px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }

        .stat { text-align: center; padding: 20px; }
        .stat-value { font-size: 36px; font-weight: 800; line-height: 1; }
        .stat-label { font-size: 13px; color: var(--muted); margin-top: 6px; }
        .stat-value.pass { color: var(--pass); }
        .stat-value.fail { color: var(--fail); }
        .stat-value.active { color: var(--active); }
        .stat-value.pending { color: var(--pending); }

        .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-pass { background: var(--pass-bg); color: var(--pass); }
        .badge-pass::before { content: '\2713 '; }
        .badge-fail { background: var(--fail-bg); color: var(--fail); }
        .badge-fail::before { content: '\2717 '; }
        .badge-active { background: var(--active-bg); color: var(--active); }
        .badge-active::before { content: '~ '; }
        .badge-reopen { background: var(--reopen-bg); color: var(--reopen); }
        .badge-reopen::before { content: '\21BA '; }
        .badge-pending { background: var(--pending-bg); color: var(--pending); }
        .badge-pending::before { content: '\2014 '; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; }
        th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        td { border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover td { background: rgba(255,255,255,0.015); }

        .btn { padding: 8px 18px; border: none; border-radius: 7px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; }
        .btn-primary { background: var(--pass); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-success { background: var(--pass); color: white; }
        .btn-warn { background: var(--active); color: #000; font-weight: 600; }
        .btn-danger { background: var(--fail); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .form-group { margin-bottom: 12px; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border);
            border-radius: 7px; background: var(--bg); color: var(--text); font-size: 14px;
            transition: border-color 0.15s;
        }
        .form-group input:focus { outline: none; border-color: var(--pass); }

        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .status-indicator { display: flex; align-items: center; gap: 10px; padding: 12px 20px; background: var(--surface2); border-radius: var(--radius); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-dot.online { background: var(--pass); box-shadow: 0 0 8px var(--pass); }
        .status-dot.paused { background: var(--active); box-shadow: 0 0 8px var(--active); }
        .status-dot.offline { background: var(--dim); }

        .chart-wrap { position: relative; max-width: 200px; margin: 0 auto; }
        .chart-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .chart-center .pct { font-size: 28px; font-weight: 800; }
        .chart-center .lbl { font-size: 11px; color: var(--muted); }

        .task-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
        .task-row .status-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
        .status-done { background: var(--pass-bg); color: var(--pass); border: 2px solid var(--pass); }
        .status-active-label { background: var(--active-bg); color: var(--active); border: 2px solid var(--active); }
        .status-pending-label { background: var(--pending-bg); color: var(--pending); border: 1px dashed var(--pending); }
        .status-reopen { background: var(--reopen-bg); color: var(--reopen); border: 2px solid var(--reopen); }

        ...existing badge CSS...

        .badge-reopen { background: var(--reopen-bg); color: var(--reopen); }

        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .progress-fill.pass { background: var(--pass); }
        .progress-fill.active { background: var(--active); }
        .progress-fill.pending { background: var(--pending); }

        .timeline { position: relative; padding-left: 24px; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--border); }
        .timeline-item { position: relative; padding: 12px 0 12px 24px; }
        .timeline-item::before { content: ''; position: absolute; left: -19px; top: 18px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); }
        .timeline-item.pass::before { border-color: var(--pass); background: var(--pass); }
        .timeline-item.fail::before { border-color: var(--fail); background: var(--fail); }

        .info-row { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 16px; }
        .info-item { display: flex; flex-direction: column; gap: 2px; }
        .info-item .label { font-size: 11px; color: var(--dim); text-transform: uppercase; }
        .info-item .value { font-size: 14px; font-weight: 500; }

        .inline-form { display: flex; gap: 10px; align-items: flex-end; }
        .inline-form .form-group { flex: 1; margin-bottom: 0; }

        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: flex; }

        /* Report Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 700px; max-width: 95vw; max-height: 80vh;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px; border-bottom: 1px solid var(--border);
        }
        .modal-header h3 { margin: 0; font-size: 16px; color: var(--text); font-family: monospace; }
        .modal-close {
            background: none; border: none; color: var(--dim); font-size: 20px;
            cursor: pointer; padding: 4px 8px; border-radius: 6px;
        }
        .modal-close:hover { color: var(--text); background: var(--surface2); }
        .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
        .modal-body.loading { display: flex; align-items: center; justify-content: center; min-height: 120px; color: var(--dim); }

        /* Markdown in report */
        .report-md h2 { font-size: 17px; color: var(--text); margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
        .report-md h2:first-child { margin-top: 0; }
        .report-md h3 { font-size: 15px; color: var(--muted); margin: 14px 0 8px; }
        .report-md p { color: var(--muted); line-height: 1.7; margin: 6px 0; }
        .report-md ul, .report-md ol { margin: 8px 0; padding-left: 20px; }
        .report-md li { color: var(--muted); line-height: 1.7; margin: 2px 0; }
        .report-md strong { color: var(--text); }
        .report-md code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 13px; color: var(--active); }
        .report-md pre { background: var(--surface2); padding: 14px; border-radius: 8px; overflow-x: auto; }
        .report-md pre code { background: none; padding: 0; font-size: 12px; }
        .report-md hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
        .report-md em { color: var(--dim); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
                <div class="logo">Loop <span>Engineering</span></div>
                <nav>
                    <a href="/" hx-get="/" hx-target="#content" hx-push-url="true" class="active">概览</a>
                    <a href="/tasks" hx-get="/tasks" hx-target="#content" hx-push-url="true">任务</a>
                    <a href="/runs" hx-get="/runs" hx-target="#content" hx-push-url="true">历史</a>
                    <a href="/control" hx-get="/control" hx-target="#content" hx-push-url="true">控制</a>
                    <a href="/settings" hx-get="/settings" hx-target="#content" hx-push-url="true">设置</a>
                    <a href="/setup" hx-get="/setup" hx-target="#content" hx-push-url="true" style="color: var(--active);">+ 初始化</a>
                </nav>
                <div id="project-switcher" style="margin-left: auto;"
                     hx-get="/api/projects/switcher" hx-trigger="load, every 60s, refreshProjectSwitcher from:body">
                    <span style="color: var(--dim); font-size: 13px;">loading...</span>
                </div>
            </div>
        </header>
        <div id="content">
            {{ content | safe }}
        </div>
    </div>
    <script>
        // ── Setup page: PRESETS & setupForm (defined globally so Alpine can find them
        //     when HTMX inserts the setup form — HTMX defers <script> execution until
        //     after DOM swap, but Alpine initializes during DOM swap via MutationObserver)
        var PRESETS = {
            'unity-tolua': [
                {type:'unity_refresh', id:'compile'},
                {type:'shell', id:'gen_lua_path', command:'python scripts/genLuaPath.py', condition:'lua_files_added'},
                {type:'lua_test', id:'runtime_test'}
            ],
            'python-server': [{type:'shell', id:'test', command:'python -m pytest || echo skipped'}],
            'generic': [{type:'shell', id:'build', command:'npm run build || echo skipped'}, {type:'shell', id:'test', command:'npm test || echo skipped'}]
        };
        function setupForm() {
            return {
                projectRoot: '',
                agentWorkspace: '',
                selectedType: '',
                verifySteps: [],
                testTemplate: '',
                previewSkills: [],
                activePreviewSkill: '',
                previewSkillContent: '',
                loadingTest: false,
                loadingSkills: false,
                mainPort: 8080,
                agentPort: 9080,
                get isUnity() { return this.selectedType.startsWith('unity'); },
                init() {
                    this.$watch('projectRoot', val => this.onProjectRootChange(val));
                },
                genWorkspace(root) {
                    if (!root) return '';
                    var p = root.replace(/\\/g, '/').replace(/\/$/, '');
                    var parts = p.split('/');
                    if (parts.length < 3) return '';
                    var parentName = parts[parts.length - 2];
                    parts.pop();
                    parts.pop();
                    return parts.join('/') + '/' + parentName + '-agent';
                },
                onProjectRootChange(val) {
                    var ws = this.genWorkspace(val);
                    if (ws) this.agentWorkspace = ws;
                },
                async fetchTemplates(type) {
                    if (!type) {
                        this.testTemplate = '';
                        this.previewSkills = [];
                        this.activePreviewSkill = '';
                        this.previewSkillContent = '';
                        return;
                    }
                    this.loadingTest = true;
                    this.loadingSkills = true;
                    try {
                        var tResp = await fetch('/api/docs/preview?type=' + encodeURIComponent(type) + '&doc=test');
                        var tData = await tResp.json();
                        this.testTemplate = tData.content || '';
                    } catch(e) {
                        this.testTemplate = '加载失败: ' + e.message;
                    }
                    this.loadingTest = false;
                    // Fetch skills preview list
                    try {
                        var sResp = await fetch('/api/docs/skills/preview?type=' + encodeURIComponent(type));
                        var sData = await sResp.json();
                        this.previewSkills = (sData.skills || []).map(function(s) {
                            return { name: s.name, label: s.label, content: '', loading: false };
                        });
                        if (this.previewSkills.length > 0) {
                            await this.switchPreviewSkill(this.previewSkills[0].name);
                        }
                    } catch(e) {
                        this.previewSkills = [];
                    }
                    this.loadingSkills = false;
                },
                async loadSkillPreview(skillName) {
                    var skill = this.previewSkills.find(function(s) { return s.name === skillName; });
                    if (!skill || skill.content || skill.loading) return;
                    skill.loading = true;
                    try {
                        var resp = await fetch('/api/docs/preview?type=' + encodeURIComponent(this.selectedType) + '&doc=' + skillName);
                        var data = await resp.json();
                        skill.content = data.content || '';
                        this.previewSkillContent = skill.content;
                    } catch(e) {
                        skill.content = '加载失败: ' + e.message;
                        this.previewSkillContent = skill.content;
                    }
                    skill.loading = false;
                },
                async switchPreviewSkill(skillName) {
                    this.activePreviewSkill = skillName;
                    var skill = this.previewSkills.find(function(s) { return s.name === skillName; });
                    if (skill && skill.content) {
                        this.previewSkillContent = skill.content;
                    } else {
                        this.previewSkillContent = '';
                        await this.loadSkillPreview(skillName);
                    }
                },
                async pickFolder(target) {
                    console.log('pickFolder called:', target);
                    try {
                        var resp = await fetch('/api/setup/pickfolder');
                        var data = await resp.json();
                        console.log('pickFolder result:', data);
                        if (data.path) {
                            if (target === 'project') {
                                this.projectRoot = data.path;
                                this.onProjectRootChange(this.projectRoot);
                            }
                            else this.agentWorkspace = data.path;
                        }
                    } catch(e) {
                        console.error('pickFolder error:', e);
                        alert('选择文件夹失败: ' + e.message);
                    }
                }
            }
        }

        // Update nav active state
        function updateNav() {
            var path = window.location.pathname;
            document.querySelectorAll('nav a').forEach(function(a) {
                a.classList.toggle('active', a.getAttribute('href') === path);
            });
        }
        document.body.addEventListener('htmx:afterSettle', updateNav);
        updateNav();  // initial call

        // ── Project state object ──
        window.Project = {
            current: function() {
                var params = new URLSearchParams(window.location.search);
                return params.get('project') || '';
            },
            bind: function(path) {
                var proj = this.current();
                if (!proj) return path;
                if (path.indexOf('project=') > -1) return path;
                return path + (path.indexOf('?') > -1 ? '&' : '?') + 'project=' + encodeURIComponent(proj);
            }
        };

        // Single htmx:configRequest — inject X-Loop-Project header + project query param
        document.body.addEventListener('htmx:configRequest', function(evt) {
            var proj = window.Project.current();
            if (proj) {
                evt.detail.headers['X-Loop-Project'] = proj;
                if (!evt.detail.path.includes('project=')) {
                    evt.detail.path += (evt.detail.path.includes('?') ? '&' : '?') + 'project=' + encodeURIComponent(proj);
                }
            }
        });

        // Refresh project switcher after content navigation (not from switcher itself)
        document.body.addEventListener('htmx:afterSettle', function(evt) {
            if (evt.target.id === 'project-switcher') return;
            htmx.trigger('#project-switcher', 'refreshProjectSwitcher');
        });

        // Settings form — defined globally so Alpine can reference it after htmx swaps
        function settingsForm() {
            return {
                config: {project: {}, agent: {}, main: {}},
                presets: [],
                selectedType: '',
                dataRepoPath: '',
                showTeardown: false,
                teardownConfirmText: '',
                loading: true,
                saving: false,
                message: null,

                async loadConfig() {
                    try {
                        var url = window.Project.bind('/api/config/current');
                        var resp = await fetch(url);
                        var data = await resp.json();
                        this.config = data.config || {project: {}, agent: {}, main: {}};
                        this.presets = data.presets || [];
                        this.selectedType = data.config.type || '';
                        this.dataRepoPath = (data.config.data_repo && data.config.data_repo.path) || '';
                        this.loading = false;
                    } catch (e) {
                        this.message = {type: 'error', text: 'Failed to load config: ' + e.message};
                        this.loading = false;
                    }
                },

                async saveConfig() {
                    this.saving = true;
                    this.message = null;
                    try {
                        var url = window.Project.bind('/api/config/update');
                        var body = {
                            project: {name: this.config.project.name},
                            agent: {
                                name: this.config.agent.name,
                                workspace: this.config.agent.workspace,
                                mcp_port: parseInt(this.config.agent.mcp_port) || 9080
                            },
                            main: {mcp_port: parseInt(this.config.main.mcp_port) || 8080},
                            type: this.selectedType || '',
                            data_repo: this.dataRepoPath ? {path: this.dataRepoPath} : null
                        };
                        var resp = await fetch(url, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(body)
                        });
                        var data = await resp.json();
                        if (resp.ok) {
                            this.message = {type: 'success', text: 'Saved. ' + (data.actions || []).join('; ')};
                            await this.loadConfig();
                        } else {
                            this.message = {type: 'error', text: data.detail || 'Save failed'};
                        }
                    } catch (e) {
                        this.message = {type: 'error', text: 'Save failed: ' + e.message};
                    }
                    this.saving = false;
                },

                async executeTeardown() {
                    if (this.teardownConfirmText !== this.config.project.name) return;
                    try {
                        var url = window.Project.bind('/api/config/teardown');
                        var resp = await fetch(url, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({confirm_name: this.teardownConfirmText, force: true})
                        });
                        var data = await resp.json();
                        if (resp.ok && data.removed) {
                            this.message = {type: 'success', text: 'Removed. Redirecting...'};
                            setTimeout(function() { window.location.href = '/'; }, 1500);
                        } else {
                            this.message = {type: 'error', text: data.detail || 'Teardown failed'};
                        }
                    } catch (e) {
                        this.message = {type: 'error', text: 'Teardown failed: ' + e.message};
                    }
                }
            };
        }

        // Docs editor — verifier skills / TEST.md online editing
        function docsEditor() {
            return {
                activeDoc: '',
                skills: [],
                content: '',
                previewHtml: '',
                saving: false,
                saved: false,
                error: '',
                timer: null,

                async init() {
                    // Fetch available skills, then load first one
                    try {
                        var url = window.Project.bind('/api/docs/skills');
                        var resp = await fetch(url);
                        var data = await resp.json();
                        this.skills = data.skills || [];
                    } catch(e) {
                        this.error = '加载 skills 列表失败: ' + e.message;
                    }
                    // Load first skill, or test as fallback
                    var first = this.skills.length > 0 ? this.skills[0].name : 'test';
                    await this.switchDoc(first);
                },

                async switchDoc(doc) {
                    this.activeDoc = doc;
                    this.saved = false;
                    this.error = '';
                    try {
                        var url = window.Project.bind('/api/docs/' + doc);
                        var resp = await fetch(url);
                        var data = await resp.json();
                        this.content = data.content || '';
                        this.onEdit();
                    } catch(e) {
                        this.error = '加载失败: ' + e.message;
                    }
                },

                onEdit() {
                    var self = this;
                    if (self.timer) clearTimeout(self.timer);
                    self.timer = setTimeout(function() {
                        self.previewHtml = marked.parse(self.content || '*（空）*');
                    }, 200);
                },

                async save() {
                    this.saving = true;
                    this.saved = false;
                    this.error = '';
                    try {
                        var url = window.Project.bind('/api/docs/' + this.activeDoc);
                        var resp = await fetch(url, {
                            method: 'PUT',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({content: this.content})
                        });
                        if (resp.ok) {
                            this.saved = true;
                        } else {
                            var data = await resp.json();
                            this.error = data.detail || data.error || '保存失败';
                        }
                    } catch(e) {
                        this.error = '保存失败: ' + e.message;
                    }
                    this.saving = false;
                }
            };
        }

        // Report modal — dispatch event to Alpine
        function viewReport(taskId) {
            var url = window.Project.bind('/api/tasks/' + taskId + '/report');
            window.dispatchEvent(new CustomEvent('open-report', {
                detail: { title: taskId, url: url }
            }));
        }

        // Reopen modal — use Alpine.store for reliable cross-component communication
        document.addEventListener('alpine:init', () => {
            Alpine.store('reopen', {
                open: false,
                taskId: '',
                desc: '',
                feedback: '',
                show(taskId, desc) {
                    this.taskId = taskId;
                    this.desc = desc;
                    this.feedback = '';
                    this.open = true;
                }
            });
        });

        function reopenTask(taskId, desc) {
            console.log('reopenTask called:', taskId, desc);
            try {
                var store = Alpine.store('reopen');
                store.show(taskId, desc);
            } catch(e) {
                console.error('reopenTask error:', e);
                alert('reopenTask 出错: ' + e.message);
            }
        }

        function submitReopen(order, status) {
            var store = Alpine.store('reopen');
            var url = window.Project.bind('/api/tasks/' + store.taskId + '/reopen');
            fetch(url, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({feedback: store.feedback})
            }).then(function(r) {
                if (r.ok) {
                    store.open = false;
                    htmx.ajax('GET', '/tasks/list?order=' + order + '&status=' + status, {target: '#tasks-list-wrap'});
                } else {
                    alert('重新打开失败');
                }
            });
        }
    </script>
</body>
</html>
