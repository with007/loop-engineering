name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.6)'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/target
          key: rust-release-${{ runner.os }}-${{ hashFiles('desktop/Cargo.lock') }}
          restore-keys: rust-release-${{ runner.os }}-

      - name: Cache Python embed
        uses: actions/cache@v4
        with:
          path: packaging/dist/python-cache
          key: python-embed-3.14.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET SDK (for vpk)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true

      - name: Install vpk CLI
        run: dotnet tool update -g vpk || dotnet tool install -g vpk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download previous nupkg (for delta)
        shell: pwsh
        run: |
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $repo = "${{ github.repository }}"
          $headers = @{ Authorization = "Bearer $token"; Accept = "application/vnd.github.v3+json" }
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases?per_page=5" -Headers $headers
          $prev = $releases | Where-Object { $_.tag_name -ne "v${{ steps.version.outputs.version }}" } | Select-Object -First 1
          if ($prev) {
            $name = "LoopDashboard-$($prev.tag_name.Substring(1))-full.nupkg"
            $asset = $prev.assets | Where-Object { $_.name -eq $name }
            if ($asset) {
              New-Item -ItemType Directory -Force -Path "packaging/releases" | Out-Null
              Write-Host "Downloading $name ($($asset.size) bytes)..."
              Invoke-WebRequest -Uri $asset.url -Headers $headers -OutFile "packaging/releases/$name"
              # Verify zip integrity — corrupted download kills vpk pack
              try {
                $zip = [System.IO.Compression.ZipFile]::OpenRead("packaging/releases/$name")
                $zip.Dispose()
                Write-Host "  Valid"
              } catch {
                Write-Host "  CORRUPTED, removing"
                Remove-Item "packaging/releases/$name" -Force
              }
            }
          }

      - name: Build & Package
        run: python packaging/release.py ${{ steps.version.outputs.version }} --skip-python
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read changelog
        id: changelog
        shell: bash
        run: |
          NOTES=$(python -c "
          import re
          c = open('CHANGELOG.md', encoding='utf-8').read()
          m = re.search(rf'## v${{ steps.version.outputs.version }}\n(.*?)(?=\n## |\Z)', c, re.DOTALL)
          if m: print(m.group(1).strip())
          ")
          NOTES="$(echo "$NOTES" | sed 's/%/%25/g' | sed ':a;N;$!ba;s/\n/%0A/g')"
          echo "notes=$NOTES" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', inputs.version) }}
          name: "Loop Dashboard v${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          prerelease: ${{ startsWith(steps.version.outputs.version, '0.') }}
          files: packaging/releases/*
