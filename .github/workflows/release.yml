name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.6)'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/target
          key: rust-release-${{ runner.os }}-${{ hashFiles('desktop/Cargo.lock') }}
          restore-keys: rust-release-${{ runner.os }}-

      - name: Cache Python embed
        uses: actions/cache@v4
        with:
          path: packaging/dist/python-cache
          key: python-embed-3.14.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET SDK (for vpk)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install vpk CLI
        run: dotnet tool install -g vpk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build Rust
        run: cargo build --release
        working-directory: desktop

      - name: Prepare dist
        shell: pwsh
        run: |
          $dist = "packaging/dist"
          Remove-Item -Recurse -Force $dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "$dist/python", "$dist/app/src/loop_engineering", "$dist/app/templates" | Out-Null

          # Use cached Python embed if available, otherwise download
          $pythonCache = "$dist/python-cache"
          if (Test-Path "$pythonCache/python.exe") {
            Write-Host "Using cached Python embed"
            Copy-Item -Recurse "$pythonCache/*" "$dist/python/"
          } else {
            Write-Host "Downloading Python embed..."
            Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.14.3/python-3.14.3-embed-amd64.zip" -OutFile "$dist/python/python-embed.zip"
            Expand-Archive -Path "$dist/python/python-embed.zip" -DestinationPath "$dist/python"
            Remove-Item "$dist/python/python-embed.zip"

            # Configure site-packages
            Set-Content -Path "$dist/python/python314._pth" -Value "python314.zip`n.`nimport site`n..\app\src"

            # Install pip + deps
            Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "$dist/python/get-pip.py"
            & "$dist/python/python.exe" "$dist/python/get-pip.py"
            Remove-Item "$dist/python/get-pip.py"
            & "$dist/python/python.exe" -m pip install fastapi uvicorn jinja2 pyyaml python-multipart markdown

            # Save to cache
            New-Item -ItemType Directory -Force -Path $pythonCache | Out-Null
            Copy-Item -Recurse "$dist/python/*" "$pythonCache/"
            Write-Host "Python embed cached"
          }

      - name: Copy app files
        shell: pwsh
        run: |
          Copy-Item "desktop/target/release/loop-dashboard.exe" "packaging/dist/"
          Copy-Item -Recurse "src/loop_engineering/*" "packaging/dist/app/src/loop_engineering/"
          Copy-Item -Recurse "templates/*" "packaging/dist/app/templates/"

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "$VERSION" > packaging/dist/version.txt
          echo "Building v$VERSION"

      - name: Download previous nupkg (for delta)
        shell: pwsh
        run: |
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $repo = "${{ github.repository }}"
          $headers = @{ Authorization = "Bearer $token"; Accept = "application/vnd.github.v3+json" }
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases?per_page=5" -Headers $headers
          # Find the latest release that is NOT the current one being built
          $currentVersion = "${{ steps.version.outputs.version }}"
          $prevFull = $releases | Where-Object { $_.tag_name -ne "v$currentVersion" } | Select-Object -First 1
          if ($prevFull) {
            $nupkgName = "LoopDashboard-$($prevFull.tag_name.Substring(1))-full.nupkg"
            $asset = $prevFull.assets | Where-Object { $_.name -eq $nupkgName }
            if ($asset) {
              New-Item -ItemType Directory -Force -Path "packaging/releases" | Out-Null
              Write-Host "Downloading $nupkgName for delta generation..."
              Invoke-WebRequest -Uri $asset.url -Headers $headers -OutFile "packaging/releases/$nupkgName"
              Write-Host "Downloaded $nupkgName"
            } else {
              Write-Host "No previous nupkg found (asset name: $nupkgName)"
            }
          } else {
            Write-Host "No previous release found (first release?)"
          }

      - name: vpk pack
        run: |
          & "$env:USERPROFILE\.dotnet\tools\vpk.exe" pack `
            --packId LoopDashboard `
            --packVersion ${{ steps.version.outputs.version }} `
            --packDir packaging/dist `
            --mainExe loop-dashboard.exe `
            --outputDir packaging/releases `
            --channel win `
            --icon desktop/icon.ico

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', inputs.version) }}
          name: "Loop Dashboard v${{ steps.version.outputs.version }}"
          prerelease: ${{ startsWith(steps.version.outputs.version, '0.') }}
          files: packaging/releases/*
