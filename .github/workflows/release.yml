name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.6)'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # ── Restore caches ──
      - uses: actions/cache/restore@v4
        id: cache-rust
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/target
          key: rust-release-${{ runner.os }}-${{ hashFiles('desktop/Cargo.lock') }}
          restore-keys: rust-release-${{ runner.os }}-

      - uses: actions/cache/restore@v4
        id: cache-python
        with:
          path: packaging/dist/python-cache
          key: python-embed-3.14.3

      - uses: actions/cache/restore@v4
        id: cache-vpk
        with:
          path: ~/.dotnet/tools
          key: vpk-1.2.0

      # ── Setup ──
      - name: Setup .NET SDK (for vpk)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install vpk CLI
        run: dotnet tool update -g vpk || dotnet tool install -g vpk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # ── Build ──
      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download previous nupkg (for delta)
        shell: pwsh
        run: |
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $repo = "${{ github.repository }}"
          $headers = @{ Authorization = "Bearer $token"; Accept = "application/vnd.github.v3+json" }
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases?per_page=10" -Headers $headers | Sort-Object -Property created_at -Descending
          $currentVersion = "${{ steps.version.outputs.version }}"
          foreach ($prev in $releases) {
            if ($prev.tag_name -eq "v$currentVersion") { continue }
            $name = "LoopDashboard-$($prev.tag_name.Substring(1))-full.nupkg"
            $asset = $prev.assets | Where-Object { $_.name -eq $name }
            if (-not $asset) { continue }
            New-Item -ItemType Directory -Force -Path "packaging/releases" | Out-Null
            Write-Host "Downloading $name ($($asset.size) bytes) from $($prev.tag_name)..."
            Invoke-WebRequest -Uri $asset.url -Headers $headers -OutFile "packaging/releases/$name"
            try {
              $zip = [System.IO.Compression.ZipFile]::OpenRead("packaging/releases/$name")
              $zip.Dispose()
              Write-Host "  Valid, using for delta"
              break
            } catch {
              Write-Host "  Corrupted, trying next release..."
              Remove-Item "packaging/releases/$name" -Force
            }
          }

      - name: Build & Package
        run: |
          if [ -f packaging/dist/python-cache/python.exe ]; then
            echo "Python cache hit, skipping download"
            python packaging/release.py ${{ steps.version.outputs.version }} --skip-python
          else
            echo "Python cache miss, full build"
            python packaging/release.py ${{ steps.version.outputs.version }}
          fi
        env:
          PYTHONIOENCODING: utf-8
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read changelog
        id: changelog
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          NOTES=$(python -c "
          import re
          c = open('CHANGELOG.md', encoding='utf-8').read()
          m = re.search(rf'## v${{ steps.version.outputs.version }}\n(.*?)(?=\n## |\Z)', c, re.DOTALL)
          if m: print(m.group(1).strip())
          ")
          NOTES="$(echo "$NOTES" | sed 's/%/%25/g' | sed ':a;N;$!ba;s/\n/%0A/g')"
          echo "notes=$NOTES" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', inputs.version) }}
          name: "Loop Dashboard v${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          prerelease: ${{ startsWith(steps.version.outputs.version, '0.') }}
          files: packaging/releases/*

      # ── Save caches (always, even on failure) ──
      - if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/target
          key: ${{ steps.cache-rust.outputs.cache-primary-key }}

      - if: always()
        uses: actions/cache/save@v4
        with:
          path: packaging/dist/python-cache
          key: python-embed-3.14.3

      - if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.dotnet/tools
          key: vpk-1.2.0
